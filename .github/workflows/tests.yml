name: tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  tests:
    name: Python ${{ matrix.python-version }} on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ["3.11", "3.12"]

    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Upgrade pip
        run: python -m pip install --upgrade pip

      - name: Install package + dev extras
        run: pip install -e ".[dev]"

      - name: Lint (ruff)
        run: python -m ruff check src tests experiments

      - name: Type-check (mypy)
        run: python -m mypy src/dcl_core
        # mypy on stubs may report errors until the implementation is in;
        # use `continue-on-error` until the package is past the stub phase,
        # then remove this line.
        continue-on-error: true

      - name: Run tests
        run: python -m pytest tests -v --cov=dcl_core --cov-report=xml

      - name: Upload coverage
        if: matrix.os == 'ubuntu-latest' && matrix.python-version == '3.12'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-xml
          path: coverage.xml
